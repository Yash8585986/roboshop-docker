services:
  catalogue:
    build: ./catalogue
    image: yash8575/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build: ./user
    image: yash8575/user:1.0.0
    container_name: user
    depends_on:
      - redis
      - mongodb
  mysql:
    build: ./mysql
    image: yash8575/mysql:1.0.0
    container_name: mysql
    volumes:
      - mysql:/var/lib/mysql
    
  shipping:
    build: ./shipping
    image: yash8575/shipping:1.0.0
    container_name: shipping
    depends_on:
      - cart
      - mysql
  cart:
    build: ./cart
    image: yash8575/cart:1.0.0
    container_name: cart
    depends_on:
      - redis
      - catalogue
  redis:
    image: redis:7.0.5
    container_name: redis
    volumes:
      - redis:/data
  frontend:
    build: ./frontend
    image: yash8575/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart  
      - shipping 
      - payment
  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq
    volumes:
      - rabbitmq:/var/lib/rabbitmq
  payment:
    build: ./payment
    image: yash8575/payment:1.0.0
    container_name: payment 
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
    depends_on:
    - rabbitmq
    - cart
    - user
  
  mongodb:
    build: ./mongodb
    image: yash8575/mongodb:1.0.0  
    container_name: mongodb
    volumes:
      - mongodb:/data/db
  

networks:
  default:
    driver: bridge
    name: roboshop
    external: false

volumes:
  mongodb:
  mysql:
  redis:
  rabbitmq: